name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify formatting
        run: npx prettier . --check

      - name: Validate release tag against package version
        shell: bash
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must match vX.Y.Z or prerelease format vX.Y.Z-suffix. Got: $TAG_NAME"
            exit 1
          fi

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v$PACKAGE_VERSION"

          if [[ "$TAG_NAME" != "$EXPECTED_TAG" ]]; then
            echo "Release tag $TAG_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.token_npm }}
